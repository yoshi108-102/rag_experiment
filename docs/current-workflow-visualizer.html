<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Current Workflow Visualizer</title>
    <style>
      :root {
        --bg-0: #f7f4ef;
        --bg-1: #fffaf2;
        --panel: #fffdf8;
        --panel-border: #eadfcd;
        --ink-0: #2d2923;
        --ink-1: #6a6053;
        --accent: #f28f3b;
        --accent-2: #0f9d8a;
        --idle: #cec4b3;
        --done: #4b7f52;
        --active: #df6f1d;
        --skip: #856a4a;
        --user: #f26b6b;
        --assistant: #ffb43d;
        --shadow: 0 12px 28px rgba(101, 76, 34, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo",
          sans-serif;
        color: var(--ink-0);
        background:
          radial-gradient(circle at 20% 10%, #fff0d8 0%, transparent 42%),
          radial-gradient(circle at 85% 80%, #ffe7d2 0%, transparent 45%),
          linear-gradient(150deg, var(--bg-1), var(--bg-0));
      }

      .shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }

      .head {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .title-wrap h1 {
        margin: 0;
        font-size: 1.4rem;
        letter-spacing: 0.02em;
      }

      .title-wrap p {
        margin: 4px 0 0;
        color: var(--ink-1);
        font-size: 0.92rem;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      button,
      select {
        font: inherit;
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        background: #fff9f1;
        color: var(--ink-0);
        padding: 8px 12px;
      }

      button {
        cursor: pointer;
      }

      button.primary {
        background: linear-gradient(160deg, #ffb24a, #f2882f);
        color: #2b1b0c;
        border-color: #e18f3f;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.15fr 1fr;
        gap: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        box-shadow: var(--shadow);
      }

      .panel h2 {
        margin: 0;
        font-size: 1rem;
      }

      .panel-head {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #f2e8d8;
      }

      .panel-body {
        padding: 14px 16px 16px;
      }

      .pipeline {
        display: grid;
        gap: 9px;
      }

      .node {
        display: grid;
        grid-template-columns: 20px 1fr auto;
        align-items: center;
        gap: 10px;
        border: 1px solid #e8dac4;
        border-radius: 11px;
        padding: 10px 11px;
        background: #fffdf8;
      }

      .node::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--idle);
        box-shadow: 0 0 0 5px rgba(206, 196, 179, 0.25);
      }

      .node.idle::before {
        background: var(--idle);
      }

      .node.active {
        border-color: #f0a060;
        background: #fff4e7;
      }

      .node.active::before {
        background: var(--active);
        box-shadow: 0 0 0 6px rgba(223, 111, 29, 0.22);
      }

      .node.done {
        border-color: #a7c9ad;
        background: #f4fbf5;
      }

      .node.done::before {
        background: var(--done);
        box-shadow: 0 0 0 6px rgba(75, 127, 82, 0.22);
      }

      .node.skipped {
        border-color: #cdb999;
        background: #faf5ec;
      }

      .node.skipped::before {
        background: var(--skip);
        box-shadow: 0 0 0 6px rgba(133, 106, 74, 0.18);
      }

      .node small {
        color: var(--ink-1);
      }

      .chat-log {
        display: grid;
        gap: 10px;
        max-height: 470px;
        overflow: auto;
        padding-right: 4px;
      }

      .msg {
        display: flex;
        gap: 10px;
        align-items: flex-start;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 0.78rem;
        flex: 0 0 auto;
      }

      .msg.user .avatar {
        background: var(--user);
      }

      .msg.assistant .avatar {
        background: var(--assistant);
        color: #322409;
      }

      .bubble {
        border-radius: 12px;
        border: 1px solid #eadfcd;
        background: #f6f7f8;
        padding: 10px 12px;
        max-width: 100%;
      }

      .msg.assistant .bubble {
        background: #fff7e8;
      }

      .bubble p {
        margin: 0;
        line-height: 1.5;
      }

      .bubble small {
        display: block;
        margin-top: 8px;
        color: var(--ink-1);
      }

      .inspector {
        display: grid;
        gap: 10px;
      }

      .kpis {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #e8dac4;
        background: #fffbf3;
        font-size: 0.82rem;
      }

      .detail {
        border: 1px solid #ecdcc5;
        border-radius: 12px;
        background: #fffaf2;
        padding: 10px 12px;
      }

      .detail h3 {
        margin: 0 0 8px;
        font-size: 0.92rem;
      }

      .detail p {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.45;
        font-size: 0.92rem;
      }

      .route {
        display: inline-block;
        margin-left: 8px;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 0.73rem;
        border: 1px solid transparent;
      }

      .route.CLARIFY {
        background: #eff7ff;
        border-color: #b7d8ff;
      }

      .route.DEEPEN {
        background: #fff2eb;
        border-color: #ffcaa6;
      }

      .route.PARK {
        background: #f7f2ff;
        border-color: #d4c2ff;
      }

      .route.FINISH {
        background: #edfff3;
        border-color: #bbe6c8;
      }

      .stage {
        margin-top: 10px;
        font-size: 0.9rem;
        color: var(--ink-1);
      }

      .scenario {
        margin-top: 8px;
        color: var(--ink-1);
        font-size: 0.86rem;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .chat-log {
          max-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="head">
        <div class="title-wrap">
          <h1>Current Workflow Visualizer</h1>
          <p>固定会話で、1ターン処理をステップ再生します。</p>
        </div>
        <div class="controls">
          <button id="stepBtn">1ステップ進める</button>
          <button id="playBtn" class="primary">自動再生</button>
          <button id="resetBtn">リセット</button>
          <label>
            再生速度
            <select id="speedSelect">
              <option value="1400">ゆっくり</option>
              <option value="850" selected>標準</option>
              <option value="500">速い</option>
            </select>
          </label>
        </div>
      </header>

      <main class="grid">
        <section class="panel">
          <div class="panel-head">
            <h2>Pipeline</h2>
            <div class="scenario" id="turnLabel"></div>
          </div>
          <div class="panel-body">
            <div class="pipeline" id="pipelineNodes"></div>
            <div class="stage" id="stageLabel">待機中</div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Conversation</h2>
          </div>
          <div class="panel-body">
            <div class="chat-log" id="chatLog"></div>
          </div>
        </section>

        <section class="panel" style="grid-column: 1 / -1">
          <div class="panel-head">
            <h2>Inspector</h2>
          </div>
          <div class="panel-body inspector">
            <div class="kpis" id="kpis"></div>
            <div class="detail">
              <h3>現在ステージの詳細</h3>
              <p id="stageDetail">再生を開始すると、ここに処理内容が表示されます。</p>
            </div>
            <div class="detail">
              <h3>最新ターンの判定</h3>
              <p id="decisionDetail">未実行</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const INITIAL_ASSISTANT_MESSAGE =
        "お疲れ様です！本日の作業はどうでしたか？何か気になったことや、迷った瞬間はありましたか？";

      const STAGES = [
        "input",
        "gate",
        "guard",
        "router",
        "ragPolicy",
        "ragExec",
        "render",
      ];

      const STAGE_META = {
        input: { label: "User Input", desc: "ユーザー発話を受け取る" },
        gate: { label: "GateClassifier", desc: "route/reason/first_questionを生成" },
        guard: { label: "DecisionGuard", desc: "終了意図や広く聞く補正を適用" },
        router: { label: "Router", desc: "routeに応じた返答を確定" },
        ragPolicy: { label: "RAG Policy", desc: "boundary/cooldown/streakを判定" },
        ragExec: { label: "RAG Lookup", desc: "検索・新規性判定（必要時のみ）" },
        render: { label: "Render & Log", desc: "UI描画とログ保存" },
      };

      const FIXED_TURNS = [
        {
          user: "曲がってるかわかりづらかった",
          gate: {
            route: "CLARIFY",
            reason: "Need detail",
            first_question: "馬台で転がす時と椅子で見る時どっちが見えづらかった？",
          },
          guard: {
            overridden: true,
            route: "CLARIFY",
            reason: "Broad gather before narrowing",
            first_question: "どんな感じで見づらかったのか、もう少し聞かせて。",
          },
        },
        {
          user: "全体がぶれて見える感じ",
          gate: {
            route: "CLARIFY",
            reason: "Still abstract",
            first_question: "どの場面でぶれが強くなった？",
          },
          guard: { overridden: false },
        },
        {
          user: "見る角度が浅いとぶれて見える",
          gate: {
            route: "CLARIFY",
            reason: "Need factor",
            first_question: "その角度になるのはどんな姿勢のとき？",
          },
          guard: { overridden: false },
        },
        {
          user: "ありがとう、今日はここまでで大丈夫",
          gate: {
            route: "CLARIFY",
            reason: "Closure intent",
            first_question: "ほかに確認したいことはある？",
          },
          guard: {
            overridden: true,
            route: "FINISH",
            reason: "Closure intent detected",
            first_question:
              "話せて少しスッキリしたなら、今日はここで区切ってよさそうですね。",
          },
        },
      ];

      const state = {
        turnIndex: 0,
        stageIndex: 0,
        playing: false,
        timer: null,
        turnRuntime: null,
        session: {
          turnCount: 0,
          lastRagTurn: -999,
          lastRagSignature: null,
          ideaBuffer: [],
        },
      };

      const refs = {
        pipeline: document.getElementById("pipelineNodes"),
        chatLog: document.getElementById("chatLog"),
        kpis: document.getElementById("kpis"),
        stageLabel: document.getElementById("stageLabel"),
        stageDetail: document.getElementById("stageDetail"),
        decisionDetail: document.getElementById("decisionDetail"),
        turnLabel: document.getElementById("turnLabel"),
        stepBtn: document.getElementById("stepBtn"),
        playBtn: document.getElementById("playBtn"),
        resetBtn: document.getElementById("resetBtn"),
        speedSelect: document.getElementById("speedSelect"),
      };

      function createPipelineNodes() {
        refs.pipeline.innerHTML = "";
        for (const stage of STAGES) {
          const node = document.createElement("div");
          node.className = "node idle";
          node.dataset.stage = stage;
          node.innerHTML = `<strong>${STAGE_META[stage].label}</strong><small>${STAGE_META[stage].desc}</small><small id="status-${stage}">idle</small>`;
          refs.pipeline.appendChild(node);
        }
      }

      function setNodeStates(activeStage, skippedStage = null) {
        for (const stage of STAGES) {
          const node = refs.pipeline.querySelector(`[data-stage="${stage}"]`);
          const status = node.querySelector(`#status-${stage}`);
          node.classList.remove("idle", "active", "done", "skipped");

          if (stage === skippedStage) {
            node.classList.add("skipped");
            status.textContent = "skipped";
            continue;
          }

          const activeIdx = STAGES.indexOf(activeStage);
          const stageIdx = STAGES.indexOf(stage);
          if (stageIdx < activeIdx) {
            node.classList.add("done");
            status.textContent = "done";
          } else if (stage === activeStage) {
            node.classList.add("active");
            status.textContent = "active";
          } else {
            node.classList.add("idle");
            status.textContent = "idle";
          }
        }
      }

      function appendMessage(role, text, route = null, note = "") {
        const msg = document.createElement("div");
        msg.className = `msg ${role}`;
        const avatarText = role === "user" ? "YOU" : "AI";
        const routeBadge = route ? `<span class="route ${route}">${route}</span>` : "";

        msg.innerHTML = `
          <div class="avatar">${avatarText}</div>
          <div class="bubble">
            <p>${escapeHtml(text)} ${routeBadge}</p>
            ${note ? `<small>${escapeHtml(note)}</small>` : ""}
          </div>
        `;
        refs.chatLog.appendChild(msg);
        refs.chatLog.scrollTop = refs.chatLog.scrollHeight;
      }

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function hashSignature(input) {
        let h = 2166136261;
        for (let i = 0; i < input.length; i += 1) {
          h ^= input.charCodeAt(i);
          h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
        }
        return (h >>> 0).toString(16);
      }

      function updateIdeaBuffer(userInput, route) {
        const session = state.session;
        session.turnCount += 1;
        session.ideaBuffer.push({ userInput, route });
        session.ideaBuffer = session.ideaBuffer.slice(-6);
      }

      function recentDeepenClarifyStreak() {
        let streak = 0;
        for (let i = state.session.ideaBuffer.length - 1; i >= 0; i -= 1) {
          const route = state.session.ideaBuffer[i].route;
          if (route === "DEEPEN" || route === "CLARIFY") {
            streak += 1;
          } else {
            break;
          }
        }
        return streak;
      }

      function buildBufferedIdeaQuery() {
        return state.session.ideaBuffer
          .map((item) => `[${item.route}] ${item.userInput}`)
          .join("\n");
      }

      function shouldRunRag(currentRoute) {
        if (currentRoute === "PARK" || currentRoute === "FINISH") {
          return [true, "boundary"];
        }

        const turnsSinceLastRag = state.session.turnCount - state.session.lastRagTurn;
        if (turnsSinceLastRag <= 2) {
          return [false, "cooldown"];
        }

        if (
          (currentRoute === "DEEPEN" || currentRoute === "CLARIFY") &&
          recentDeepenClarifyStreak() >= 3
        ) {
          return [true, "streak"];
        }

        return [false, "not-triggered"];
      }

      function shouldSkipSameQuery(query) {
        const flat = query.replaceAll("\n", "").trim();
        if (!flat || flat.length < 15) {
          return true;
        }
        const signature = hashSignature(query);
        return signature === state.session.lastRagSignature;
      }

      function clearIdeaBufferIfBoundary(route) {
        if (route === "PARK" || route === "FINISH") {
          state.session.ideaBuffer = [];
        }
      }

      function finalizeRagRun(query, route) {
        state.session.lastRagTurn = state.session.turnCount;
        state.session.lastRagSignature = hashSignature(query);
        if (route === "PARK" || route === "FINISH") {
          state.session.ideaBuffer = [];
        }
      }

      function mockRagLookup(turnIndex) {
        const byTurn = [
          null,
          null,
          {
            top_match:
              "過去ログ: 角度が浅いと全体の曲がり判断が不安定になりやすい",
            score: 0.84,
            is_novel: false,
          },
          {
            top_match:
              "過去ログ: 作業終盤の振り返りで視点整理が進みやすい",
            score: 0.63,
            is_novel: true,
          },
        ];
        return byTurn[turnIndex] || {
          top_match: "一致する知識なし",
          score: 0.0,
          is_novel: true,
        };
      }

      function buildRagDebug(route, turnIndex) {
        const [run, trigger] = shouldRunRag(route);
        if (!run) {
          clearIdeaBufferIfBoundary(route);
          return {
            enabled: false,
            trigger,
            skipped_reason: trigger,
            query: "",
            result: null,
          };
        }

        const query = buildBufferedIdeaQuery();
        if (shouldSkipSameQuery(query)) {
          clearIdeaBufferIfBoundary(route);
          return {
            enabled: false,
            trigger,
            skipped_reason: "same-or-too-short-query",
            query,
            result: null,
          };
        }

        const result = mockRagLookup(turnIndex);
        finalizeRagRun(query, route);
        return {
          enabled: true,
          trigger,
          skipped_reason: null,
          query,
          result,
        };
      }

      function pickFinalDecision(turn) {
        if (turn.guard && turn.guard.overridden) {
          return {
            route: turn.guard.route,
            reason: turn.guard.reason,
            first_question: turn.guard.first_question,
            overridden: true,
          };
        }
        return {
          route: turn.gate.route,
          reason: turn.gate.reason,
          first_question: turn.gate.first_question,
          overridden: false,
        };
      }

      function renderKpis() {
        const session = state.session;
        const signature = session.lastRagSignature
          ? `${session.lastRagSignature.slice(0, 8)}...`
          : "なし";
        refs.kpis.innerHTML = `
          <span class="chip">turn_count: ${session.turnCount}</span>
          <span class="chip">last_rag_turn: ${session.lastRagTurn}</span>
          <span class="chip">idea_buffer: ${session.ideaBuffer.length}</span>
          <span class="chip">last_signature: ${signature}</span>
        `;
      }

      function describeDecision(runtime) {
        if (!runtime) {
          refs.decisionDetail.textContent = "未実行";
          return;
        }
        const raw = runtime.rawDecision;
        const fin = runtime.finalDecision;
        const rag = runtime.ragDebug;
        const ragLine = !rag
          ? "RAG: 未判定"
          : rag.enabled
            ? `RAG: 実行 (trigger=${rag.trigger}, score=${rag.result.score})`
            : `RAG: スキップ (${rag.skipped_reason})`;
        refs.decisionDetail.textContent =
          `raw: ${raw.route} / ${raw.reason}\n` +
          `guard後: ${fin.route} / ${fin.reason}\n` +
          `返答: ${fin.first_question}\n` +
          ragLine;
      }

      function setStageInfo(text, stage) {
        refs.stageDetail.textContent = text;
        refs.stageLabel.textContent = `ステージ: ${STAGE_META[stage].label}`;
      }

      function resetPipelineToIdle() {
        setNodeStates("input");
        for (const stage of STAGES) {
          const node = refs.pipeline.querySelector(`[data-stage="${stage}"]`);
          node.classList.remove("active", "done", "skipped");
          node.classList.add("idle");
          const status = node.querySelector(`#status-${stage}`);
          status.textContent = "idle";
        }
      }

      function initConversation() {
        refs.chatLog.innerHTML = "";
        appendMessage("assistant", INITIAL_ASSISTANT_MESSAGE, null, "初期メッセージ");
      }

      function updateTurnLabel() {
        if (state.turnIndex >= FIXED_TURNS.length) {
          refs.turnLabel.textContent = "全ターン完了";
          return;
        }
        refs.turnLabel.textContent = `Turn ${state.turnIndex + 1} / ${FIXED_TURNS.length}`;
      }

      function stopAutoPlay() {
        state.playing = false;
        if (state.timer) {
          clearInterval(state.timer);
          state.timer = null;
        }
        refs.playBtn.textContent = "自動再生";
      }

      function executeStage(turn, stage) {
        if (!state.turnRuntime) {
          state.turnRuntime = {
            rawDecision: null,
            finalDecision: null,
            response: null,
            ragDebug: null,
          };
        }

        const runtime = state.turnRuntime;

        if (stage === "input") {
          setNodeStates("input");
          appendMessage("user", turn.user);
          setStageInfo(`ユーザー入力を受信:\n${turn.user}`, "input");
          return;
        }

        if (stage === "gate") {
          setNodeStates("gate");
          runtime.rawDecision = { ...turn.gate };
          setStageInfo(
            `GateDecision(raw):\nroute=${turn.gate.route}\nreason=${turn.gate.reason}\nfirst_question=${turn.gate.first_question}`,
            "gate",
          );
          describeDecision(runtime);
          return;
        }

        if (stage === "guard") {
          setNodeStates("guard");
          runtime.finalDecision = pickFinalDecision(turn);
          const guardNote = runtime.finalDecision.overridden
            ? "override適用: yes"
            : "override適用: no";
          setStageInfo(
            `${guardNote}\nroute=${runtime.finalDecision.route}\nreason=${runtime.finalDecision.reason}`,
            "guard",
          );
          describeDecision(runtime);
          return;
        }

        if (stage === "router") {
          setNodeStates("router");
          runtime.response = runtime.finalDecision.first_question;
          setStageInfo(
            `Router出力:\n${runtime.response}\n(route=${runtime.finalDecision.route})`,
            "router",
          );
          describeDecision(runtime);
          return;
        }

        if (stage === "ragPolicy") {
          setNodeStates("ragPolicy");
          updateIdeaBuffer(turn.user, runtime.finalDecision.route);
          runtime.ragDebug = buildRagDebug(runtime.finalDecision.route, state.turnIndex);
          const rag = runtime.ragDebug;
          const line = rag.enabled
            ? `RAG実行予定 (trigger=${rag.trigger})`
            : `RAGスキップ (${rag.skipped_reason})`;
          setStageInfo(`${line}\nquery:\n${rag.query || "(なし)"}`, "ragPolicy");
          renderKpis();
          describeDecision(runtime);
          return;
        }

        if (stage === "ragExec") {
          const rag = runtime.ragDebug;
          if (!rag || !rag.enabled) {
            setNodeStates("ragExec", "ragExec");
            setStageInfo("RAG lookupは実行されません。", "ragExec");
          } else {
            setNodeStates("ragExec");
            setStageInfo(
              `RAG結果:\nTopMatch=${rag.result.top_match}\nscore=${rag.result.score}\nis_novel=${rag.result.is_novel}`,
              "ragExec",
            );
          }
          describeDecision(runtime);
          return;
        }

        if (stage === "render") {
          setNodeStates("render");
          const rag = runtime.ragDebug;
          const note = rag?.enabled
            ? `RAG: ${rag.trigger} / score=${rag.result.score}`
            : `RAG: ${rag?.skipped_reason || "not-triggered"}`;
          appendMessage("assistant", runtime.response, runtime.finalDecision.route, note);
          setStageInfo("UI描画とログ保存を実行。", "render");
          describeDecision(runtime);
          return;
        }
      }

      function advanceOneStep() {
        if (state.turnIndex >= FIXED_TURNS.length) {
          stopAutoPlay();
          refs.stageLabel.textContent = "全ターン完了";
          refs.stageDetail.textContent = "固定シナリオの再生は完了しました。";
          return;
        }

        const turn = FIXED_TURNS[state.turnIndex];
        const stage = STAGES[state.stageIndex];
        executeStage(turn, stage);

        state.stageIndex += 1;
        if (state.stageIndex >= STAGES.length) {
          state.stageIndex = 0;
          state.turnIndex += 1;
          state.turnRuntime = null;
          updateTurnLabel();
          if (state.turnIndex < FIXED_TURNS.length) {
            setTimeout(() => {
              resetPipelineToIdle();
              refs.stageLabel.textContent = "次ターン待機";
            }, 200);
          }
        }
      }

      function resetAll() {
        stopAutoPlay();
        state.turnIndex = 0;
        state.stageIndex = 0;
        state.turnRuntime = null;
        state.session = {
          turnCount: 0,
          lastRagTurn: -999,
          lastRagSignature: null,
          ideaBuffer: [],
        };

        initConversation();
        resetPipelineToIdle();
        refs.stageLabel.textContent = "待機中";
        refs.stageDetail.textContent = "再生を開始すると、ここに処理内容が表示されます。";
        refs.decisionDetail.textContent = "未実行";
        updateTurnLabel();
        renderKpis();
      }

      function startAutoPlay() {
        if (state.playing) {
          stopAutoPlay();
          return;
        }
        state.playing = true;
        refs.playBtn.textContent = "停止";

        const delay = Number(refs.speedSelect.value);
        state.timer = setInterval(() => {
          advanceOneStep();
          if (state.turnIndex >= FIXED_TURNS.length) {
            stopAutoPlay();
          }
        }, delay);
      }

      refs.stepBtn.addEventListener("click", advanceOneStep);
      refs.playBtn.addEventListener("click", startAutoPlay);
      refs.resetBtn.addEventListener("click", resetAll);
      refs.speedSelect.addEventListener("change", () => {
        if (state.playing) {
          stopAutoPlay();
          startAutoPlay();
        }
      });

      createPipelineNodes();
      resetAll();
    </script>
  </body>
</html>
